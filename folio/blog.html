<!DOCTYPE html>
<html lang="ko" class="theme-dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog · SKALA Folio</title>
  <meta name="description" content="블로그 — TesseraJS 블로그 기능(IndexedDB · 조회수 · 좋아요 · 북마크)으로 구동되는 글 목록." />
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="../aurora-ui/css/main.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/engine.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <style>
    /* 페이지 스코프 — 글 목록 썸네일 · 상세(마크다운 렌더 + 갤러리). folio 토큰만 사용 */
    .blog-thumb { width: 100%; aspect-ratio: 16 / 10; object-fit: cover; border-radius: 3px; display: block; margin-bottom: 12px; background: var(--color-void); }
    .blog-scroll { max-height: 58vh; overflow: auto; padding-right: 8px; margin: 6px 0 4px; }
    .blog-cover { width: 100%; height: auto; border-radius: 3px; display: block; margin-bottom: 20px; }
    .blog-prose { line-height: 1.78; font-size: 14px; }
    .blog-prose h2 { font-family: var(--font-display); font-size: clamp(19px, 2.4vw, 25px); font-weight: 400; margin: 26px 0 10px; }
    .blog-prose h3 { font-family: var(--font-display); font-size: 17px; font-weight: 400; margin: 22px 0 8px; opacity: .95; }
    .blog-prose h4 { font-size: 14px; font-weight: 600; margin: 18px 0 6px; opacity: .9; }
    .blog-prose p { margin: 0 0 13px; opacity: .82; }
    .blog-prose ul, .blog-prose ol { margin: 0 0 14px; padding-left: 20px; }
    .blog-prose li { margin: 5px 0; opacity: .82; }
    .blog-prose strong { font-weight: 600; opacity: 1; }
    .blog-prose code { font-family: var(--font-mono, ui-monospace, monospace); font-size: 12px; padding: 1px 5px; border-radius: 3px; background: color-mix(in srgb, var(--fg) 13%, transparent); }
    .blog-prose pre { background: color-mix(in srgb, var(--fg) 8%, transparent); border-radius: 4px; padding: 14px 16px; overflow-x: auto; margin: 0 0 15px; }
    .blog-prose pre code { background: none; padding: 0; font-size: 12px; line-height: 1.6; }
    .blog-prose blockquote { margin: 0 0 15px; padding: 2px 0 2px 16px; border-left: 2px solid color-mix(in srgb, var(--fg) 30%, transparent); }
    .blog-prose blockquote p { opacity: .68; font-style: italic; margin: 0; }
    .blog-prose table { width: 100%; border-collapse: collapse; margin: 0 0 16px; font-size: 13px; }
    .blog-prose th, .blog-prose td { text-align: left; padding: 8px 10px; border-bottom: 1px solid color-mix(in srgb, var(--fg) 14%, transparent); }
    .blog-prose th { font-weight: 600; opacity: .95; }
    .blog-prose td { opacity: .78; }
    .blog-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 14px; margin-top: 24px; }
    .blog-gallery figure { margin: 0; }
    .blog-gallery img, .blog-gallery video { width: 100%; height: auto; display: block; border-radius: 3px; background: var(--color-void); }
    .blog-gallery figcaption { font-size: 11px; opacity: .5; margin-top: 7px; line-height: 1.5; }
  </style>
</head>
<body>
  <canvas id="folio-bg" class="folio-bg" aria-hidden="true"></canvas>

  <a class="folio-logo" href="index.html" data-cursor="home">SKALA</a>
  <nav class="folio-nav" aria-label="주요 메뉴">
    <div class="folio-nav__l"></div>
    <div class="folio-nav__m"></div>
    <div class="folio-nav__r"><a href="index.html" data-cursor="back">← Index</a></div>
  </nav>

  <main class="folio-doc">
    <header class="folio-doc__hero">
      <p class="folio-doc__eyebrow reveal">05 / Blog</p>
      <h1 class="folio-doc__title reveal" data-split>블로그</h1>
      <p class="folio-doc__lead reveal">직접 만든 것들에 대한 기록. 목록·조회수·좋아요·북마크가 모두 <mark>IndexedDB</mark>에 실제로 저장됩니다 (TesseraJS 블로그 기능).</p>
    </header>

    <section class="folio-doc__section" data-theme="dark">
      <p class="folio-doc__label reveal">Posts — TesseraJS blog · IndexedDB</p>
      <div class="folio-cards reveal" id="blog-list"></div>
    </section>
  </main>

  <footer class="folio-section folio-footer" data-theme="dark">
    <div class="folio-footer__big reveal" data-split>Back to<br>the hub.</div>
    <a class="jour" href="index.html" data-cursor="home">
      <span class="jour__word">SKALA · Index</span>
      <span class="jour__arrow">
        <svg class="rel" viewBox="0 0 10 10"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
        <svg class="abs" viewBox="0 0 10 10"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.4" fill="none"/></svg>
      </span>
    </a>
  </footer>

  <dialog id="post-modal" class="folio-modal">
    <article class="folio-modal__inner">
      <button class="folio-modal__close" type="button" data-modal-close aria-label="닫기">×</button>
      <span class="aur-badge" id="post-cat"></span>
      <h3 id="post-title"></h3>
      <p class="folio-block__meta" id="post-meta"></p>
      <div class="blog-scroll">
        <img id="post-cover" class="blog-cover" alt="" hidden>
        <div id="post-content" class="blog-prose"></div>
        <div id="post-gallery" class="blog-gallery"></div>
      </div>
      <div class="folio-form__actions">
        <button class="folio-btn" id="post-like" type="button" data-cursor="like">♡ 좋아요</button>
        <button class="folio-btn" id="post-bookmark" type="button" data-cursor="save">🔖 북마크</button>
      </div>
    </article>
  </dialog>

  <button class="folio-mute" type="button" aria-pressed="false" data-cursor="audio">♪ sound off</button>
  <div class="folio-eq" id="folio-eq" aria-hidden="true"></div>

  <script src="../aurora-ui/js/theme.js" defer></script>
  <script src="../aurora-ui/js/components.js" defer></script>
  <script type="module" src="../script/folio/blog.js"></script>
</body>
</html>
