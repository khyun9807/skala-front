<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - signUp</title>
</head>
<body>
    <header>
        <h1>👤 회원가입</h1>
        <p>SKALA-FRONT 회원가입을 환영합니다.</p>
    </header>

    <main>
        <form action="signUpResult.html" method="get">
            <fieldset>
                <legend>계정 정보</legend>

                <p>
                    <label for="userId">아이디:</label>
                    <input type="text" id="userId" name="userId" placeholder="4~15자 영문/숫자" minlength="4" maxlength="15" required>
                    (필수)
                </p>

                <p>
                    <label for="userPw">비밀번호:</label>
                    <input type="password" id="userPw" name="userPw" placeholder="8자 이상 입력" minlength="8" required>
                    (필수)
                </p>

                <p>
                    <label for="userEmail">이메일:</label>
                    <input type="text" id="userEmail" name="userEmailId" placeholder="example" required>
                    @
                    <input type="text" id="emailDomainInput" name="emailDomainInput" list="emailDomainList" placeholder="직접 입력 또는 목록에서 선택">
                    <datalist id="emailDomainList">
                        <option value="naver.com">
                        <option value="gmail.com">
                        <option value="daum.net">
                        <option value="kakao.com">
                    </datalist>
                </p>
            </fieldset>

            <fieldset>
                <legend>개인 프로필 정보</legend>

                <p>
                    <label for="userName">이름:</label>
                    <input type="text" id="userName" name="userName">
                </p>

                <p>
                    <label for="birthDate">생년월일:</label>
                    <input type="date" id="birthDate" name="birthDate">
                </p>

                <fieldset>
                    <legend>성별</legend>
                    <label><input type="radio" name="gender" value="male" checked> 남성</label>
                    <label><input type="radio" name="gender" value="female"> 여성</label>
                    <label><input type="radio" name="gender" value="none"> 선택안함</label>
                </fieldset>

                <fieldset>
                    <legend>관심 분야 (중복 선택 가능)</legend>
                    <label><input type="checkbox" name="interest" value="frontend"> 웹 프론트엔드 (Vue.js/HTML)</label><br>
                    <label><input type="checkbox" name="interest" value="uiux"> UI/UX 디자인 표준</label><br>
                    <label><input type="checkbox" name="interest" value="backend"> 백엔드 &amp; 데이터베이스</label><br>
                    <label><input type="checkbox" name="interest" value="cloud"> 클라우드 &amp; 인프라</label>
                </fieldset>

                <p>
                    <label for="joinRoute">가입 경로:</label>
                    <select id="joinRoute" name="joinRoute">
                        <optgroup label="온라인">
                            <option value="">-- 선택해 주세요 --</option>
                            <option value="search">검색 엔진</option>
                            <option value="sns">SNS</option>
                        </optgroup>
                        <optgroup label="오프라인">
                            <option value="friend">지인 추천</option>
                            <option value="event">설명회/행사</option>
                        </optgroup>
                    </select>
                </p>
            </fieldset>

            <fieldset>
                <legend>자기소개</legend>
                <p>나를 표현하는 한 줄 소개 또는 가입 인사:</p>
                <textarea name="introduce" rows="4" cols="50" maxlength="200" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
            </fieldset>

            <p>
                <button type="submit">동의하고 회원가입</button>
                <button type="reset">다시 작성</button>
            </p>
        </form>
    </main>

    <p><a href="index.html">&larr; 메인으로 돌아가기</a></p>
</body>
</html>
